              <button type="button">商品規格の設定</button>
            </div>

            <ul class="variable-list">

                <div class="select-variable01" data-selectbox>
                  <button
                    type="button"
                    class="selectbox__head"
                    aria-expanded="false"
                  >
                    <input
                      type="hidden"
                      name="selectVariable01"
                      value=""
                      data-selectbox-hidden
                    />
                    <span class="selectbox__value" data-selectbox-value
                      >規格1を選択してください</span
                    >
                  </button>
                  <div class="list-wrapper">
                    <ul class="selectbox__panel">
                      <li>
                        <input
                          type="radio"
                          name="selectVariable01"
                          value="1"
                          id="selectVariable01Option01"
                        />
                        <label for="selectVariable01Option01"
                          >フレバー（CUBE用味）</label
                        >
                      </li>
                      <li>
                        <input
                          type="radio"
                          name="selectVariable01"
                          value="2"
                          id="selectVariable01Option02"
                        />
                        <label for="selectVariable01Option02"
                          >サイズ（CUBE用サイズ）</label

                      </li>
                    </ul>
                  </div>
                </div>
              </li>

                          value="1"

                      <li>
